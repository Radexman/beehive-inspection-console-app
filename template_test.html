<!doctype html>
<html lang="pl">
	<head>
		<meta charset="UTF-8" />
		<style>
			body {
				font-family: Arial, sans-serif;
				padding: 40px;
				color: #1a1a18;
			}
			h1 {
				color: #2d5a1b;
				border-bottom: 2px solid #2d5a1b;
				padding-bottom: 8px;
			}
			.field {
				margin: 16px 0;
			}
			.label {
				font-size: 12px;
				color: #6b6b65;
				text-transform: uppercase;
				letter-spacing: 0.08em;
			}
			.value {
				font-size: 18px;
				font-weight: bold;
				margin-top: 4px;
			}
		</style>
	</head>
	<body>
		<h1>Protokół przeglądu</h1>
		<div class="field">
			<div class="label">Ul nr</div>
			<div class="value">{{ beehive_number }}</div>
		</div>
		<div class="field">
			<div class="label">Imię pszczelarza</div>
			<div class="value">{{ beekeeper_first_name }}</div>
		</div>
		<div class="field">
			<div class="label">Nazwisko pszczelarza</div>
			<div class="value">{{ beekeeper_last_name }}</div>
		</div>
	</body>
</html>
